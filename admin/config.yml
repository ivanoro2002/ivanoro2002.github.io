backend:
  name: git-gateway
  branch: main

media_folder: "assets/uploads"
public_folder: "assets/uploads"

local_backend: true
site_url: "https://ivan-portafolioit.netlify.app"
display_url: "https://ivan-portafolioit.netlify.app"

collections:
  - name: "portfolio"
    label: "Portafolio"
    description: "Edita los textos, proyectos, habilidades, cursos, links y datos visibles del portafolio."
    editor:
      preview: false
    files:
      - name: "contenido"
        label: "Editar contenido del portafolio"
        file: "content/portfolio.json"
        format: "json"
        fields:
          - label: "Perfil"
            name: "profile"
            widget: "object"
            collapsed: false
            hint: "Datos principales que aparecen en el inicio, enlaces y contacto."
            fields:
              - { label: "Nombre", name: "name", widget: "string" }
              - { label: "Rol", name: "role", widget: "string" }
              - { label: "Ubicacion", name: "location", widget: "string" }
              - { label: "Email", name: "email", widget: "string" }
              - { label: "Telefono", name: "phone", widget: "string", required: false }
              - { label: "WhatsApp", name: "whatsapp", widget: "string", required: false }
              - { label: "GitHub", name: "github", widget: "string" }
              - { label: "LinkedIn", name: "linkedin", widget: "string" }
              - { label: "CV", name: "cvUrl", widget: "file", required: false }
              - { label: "Resumen", name: "summary", widget: "text" }

          - label: "Datos rapidos"
            name: "quickFacts"
            widget: "list"
            summary: "{{fields.label}}: {{fields.value}}"
            minimize_collapsed: true
            hint: "Tarjetas pequenas debajo de la presentacion principal."
            fields:
              - { label: "Etiqueta", name: "label", widget: "string" }
              - { label: "Valor", name: "value", widget: "string" }

          - label: "Focos"
            name: "focus"
            widget: "list"
            summary: "{{fields.item}}"
            minimize_collapsed: true
            hint: "Puntos breves del panel de objetivo actual."
            field: { label: "Texto", name: "item", widget: "string" }

          - label: "Sobre mi"
            name: "about"
            widget: "object"
            collapsed: false
            hint: "Texto principal para explicar quien sos, que estudias y que estas buscando."
            fields:
              - { label: "Texto principal", name: "main", widget: "text" }
              - { label: "Texto secundario", name: "secondary", widget: "text" }

          - label: "Resumen de perfil"
            name: "profileStrip"
            widget: "list"
            summary: "{{fields.label}}: {{fields.value}}"
            minimize_collapsed: true
            hint: "Tres tarjetas cortas debajo de Sobre mi."
            fields:
              - { label: "Etiqueta", name: "label", widget: "string" }
              - { label: "Valor", name: "value", widget: "string" }

          - label: "Perfil de busqueda"
            name: "opportunityCards"
            widget: "list"
            summary: "{{fields.label}} - {{fields.title}}"
            minimize_collapsed: true
            hint: "Tarjetas para explicar roles objetivo, valor actual y disponibilidad."
            fields:
              - { label: "Etiqueta", name: "label", widget: "string" }
              - { label: "Titulo", name: "title", widget: "string" }
              - { label: "Descripcion", name: "description", widget: "text" }

          - label: "Proyectos"
            name: "projects"
            widget: "list"
            summary: "{{fields.name}} - {{fields.status}}"
            minimize_collapsed: true
            hint: "Cada proyecto puede tener descripcion, tecnologias, imagen, demo y repositorio."
            fields:
              - { label: "Nombre", name: "name", widget: "string" }
              - { label: "Estado", name: "status", widget: "string" }
              - { label: "Tipo", name: "type", widget: "string" }
              - { label: "Descripcion", name: "description", widget: "text" }
              - { label: "Imagen", name: "image", widget: "image", required: false }
              - label: "Tecnologias"
                name: "tags"
                widget: "list"
                summary: "{{fields.tag}}"
                minimize_collapsed: true
                field: { label: "Tecnologia", name: "tag", widget: "string" }
              - label: "Links"
                name: "links"
                widget: "list"
                summary: "{{fields.label}}"
                minimize_collapsed: true
                fields:
                  - { label: "Texto", name: "label", widget: "string" }
                  - { label: "URL", name: "href", widget: "string", required: false }
                  - { label: "Icono", name: "icon", widget: "string", required: false }

          - label: "Habilidades"
            name: "skills"
            widget: "list"
            summary: "{{fields.label}}"
            minimize_collapsed: true
            hint: "Categorias de habilidades. Los iconos disponibles son textos como python, java, html, css, github, react."
            fields:
              - { label: "ID", name: "id", widget: "string" }
              - { label: "Titulo", name: "label", widget: "string" }
              - label: "Items"
                name: "items"
                widget: "list"
                summary: "{{fields.name}}"
                minimize_collapsed: true
                fields:
                  - { label: "Nombre", name: "name", widget: "string" }
                  - { label: "Nota", name: "note", widget: "text" }
                  - { label: "Icono", name: "icon", widget: "string", required: false }
                  - { label: "Color", name: "accent", widget: "string", required: false }

          - label: "Cursos y aprendizaje"
            name: "learning"
            widget: "list"
            summary: "{{fields.status}} - {{fields.title}}"
            minimize_collapsed: true
            hint: "Cursos terminados, en progreso o proximos. Ideal para Udemy, GitHub, ingles y practica."
            fields:
              - { label: "Estado", name: "status", widget: "string" }
              - { label: "Titulo", name: "title", widget: "string" }
              - { label: "Institucion o plataforma", name: "provider", widget: "string" }
              - { label: "Descripcion", name: "description", widget: "text" }

          - label: "Formacion y timeline"
            name: "timeline"
            widget: "list"
            summary: "{{fields.period}} - {{fields.title}}"
            minimize_collapsed: true
            hint: "Linea de tiempo: universidad, cursos, idiomas y objetivo profesional."
            fields:
              - { label: "Periodo", name: "period", widget: "string" }
              - { label: "Titulo", name: "title", widget: "string" }
              - { label: "Descripcion", name: "description", widget: "text" }

          - label: "Perfiles"
            name: "profileLinks"
            widget: "list"
            summary: "{{fields.label}}"
            minimize_collapsed: true
            hint: "Botones grandes hacia GitHub, LinkedIn y CV."
            fields:
              - { label: "Etiqueta", name: "label", widget: "string" }
              - { label: "Descripcion", name: "description", widget: "text" }
              - { label: "CTA", name: "cta", widget: "string" }
              - { label: "URL", name: "href", widget: "string", required: false }
              - { label: "Icono", name: "icon", widget: "string", required: false }

          - label: "Contacto"
            name: "contactLinks"
            widget: "list"
            summary: "{{fields.label}}"
            minimize_collapsed: true
            hint: "Botones de contacto del pie de pagina, como Gmail y WhatsApp."
            fields:
              - { label: "Texto", name: "label", widget: "string" }
              - { label: "Detalle", name: "detail", widget: "string", required: false }
              - { label: "Icono", name: "icon", widget: "string", required: false }
              - { label: "URL", name: "href", widget: "string", required: false }
              - { label: "Accesibilidad", name: "ariaLabel", widget: "string", required: false }
