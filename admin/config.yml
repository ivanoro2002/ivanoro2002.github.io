backend:
  name: git-gateway
  branch: main

media_folder: "assets/uploads"
public_folder: "assets/uploads"

local_backend: true
locale: "es"
site_url: "https://ivan-portafolioit.netlify.app"
display_url: "https://ivan-portafolioit.netlify.app"

collections:
  - name: "portfolio"
    label: "Portafolio"
    description: "Editor privado para cambiar la web pública. Guardás, publicás y Netlify actualiza el sitio."
    editor:
      preview: false
    files:
      - name: "contenido"
        label: "Editar contenido del portafolio"
        file: "content/portfolio.json"
        format: "json"
        fields:
          - label: "Perfil"
            name: "profile"
            widget: "object"
            collapsed: false
            hint: "Inicio de la web: nombre, rol, resumen, enlaces principales y CV. Si cambias el CV acá, se actualizan los botones públicos de CV."
            fields:
              - { label: "Nombre completo", name: "name", widget: "string", hint: "Aparece grande en la portada." }
              - { label: "Rol o título profesional", name: "role", widget: "string", hint: "Aparece arriba del nombre. Ejemplo: Estudiante de Programación | Perfil inicial IT." }
              - { label: "Ubicación", name: "location", widget: "string", hint: "Ciudad o zona general." }
              - { label: "Correo", name: "email", widget: "string", hint: "Correo principal para contacto laboral." }
              - { label: "Teléfono", name: "phone", widget: "string", required: false, hint: "Opcional. Si no querés mostrarlo, podés dejarlo vacáo." }
              - { label: "Link de WhatsApp", name: "whatsapp", widget: "string", required: false, hint: "Link completo de wa.me. Se usa para contacto rápido." }
              - { label: "GitHub", name: "github", widget: "string", hint: "Link completo de tu GitHub." }
              - { label: "LinkedIn", name: "linkedin", widget: "string", hint: "Link completo de tu perfil de LinkedIn." }
              - label: "Subir CV en PDF"
                name: "cvUrl"
                widget: "file"
                required: false
                media_folder: "assets/cv"
                public_folder: "assets/cv"
                media_library:
                  config:
                    multiple: false
                hint: "Apretá Elegir archivo/Subir, seleccioná el PDF desde tu computadora y guardá. No pegues una ruta local de Windows; el archivo debe quedar guardado dentro del sitio."
              - { label: "Resumen de portada", name: "summary", widget: "text", hint: "Texto breve debajo del nombre: qué estudiás, qué estás buscando y qué te interesa." }

          - label: "Apariencia"
            name: "appearance"
            widget: "object"
            collapsed: false
            hint: "Color general de la web pública. Solo cambia la apariencia; no hace más pesada la página."
            fields:
              - label: "Tema de color"
                name: "theme"
                widget: "select"
                default: "green"
                options:
                  - { label: "Verde menta + grafito", value: "green" }
                  - { label: "Azul tech + verde", value: "blue" }
                  - { label: "Violeta creativo + verde", value: "violet" }
                  - { label: "Ámbar cálido + azul", value: "amber" }
                  - { label: "Coral suave + celeste", value: "coral" }
                  - { label: "Rojo rubí + celeste", value: "ruby" }
                  - { label: "Índigo elegante + cian", value: "indigo" }
                hint: "Elegís uno, guardás y el cambio se ve en la web pública después de publicar."

          - label: "Datos rápidos"
            name: "quickFacts"
            widget: "list"
            summary: "{{fields.label}}: {{fields.value}}"
            minimize_collapsed: true
            hint: "Tarjetas pequeñas debajo de la portada. Sirven para datos cortos como ubicación, perfil o carrera."
            fields:
              - { label: "Etiqueta", name: "label", widget: "string" }
              - { label: "Valor", name: "value", widget: "string" }

          - label: "Focos"
            name: "focus"
            widget: "list"
            summary: "{{fields.item}}"
            minimize_collapsed: true
            hint: "Puntos breves del panel lateral de la portada. Explican en qué estás enfocado ahora."
            field: { label: "Texto", name: "item", widget: "string" }

          - label: "Sobre mí"
            name: "about"
            widget: "object"
            collapsed: false
            hint: "Sección Sobre mí. Explica quién sos, qué estudiás, qué buscás y cómo estás construyendo tu perfil."
            fields:
              - { label: "Texto principal", name: "main", widget: "text" }
              - { label: "Texto secundario", name: "secondary", widget: "text" }

          - label: "Resumen de perfil"
            name: "profileStrip"
            widget: "list"
            summary: "{{fields.label}}: {{fields.value}}"
            minimize_collapsed: true
            hint: "Tres tarjetas cortas debajo de Sobre mí. Mantenerlo breve para que se lea rápido."
            fields:
              - { label: "Etiqueta", name: "label", widget: "string" }
              - { label: "Valor", name: "value", widget: "string" }

          - label: "Perfil de búsqueda"
            name: "opportunityCards"
            widget: "list"
            summary: "{{fields.label}} - {{fields.title}}"
            minimize_collapsed: true
            hint: "Sección Objetivo. Sirve para explicar roles que buscás, qué podés aportar y disponibilidad."
            fields:
              - { label: "Etiqueta", name: "label", widget: "string" }
              - { label: "Título", name: "title", widget: "string" }
              - { label: "Descripción", name: "description", widget: "text" }

          - label: "Proyectos"
            name: "projects"
            widget: "list"
            summary: "{{fields.name}} - {{fields.status}}"
            minimize_collapsed: true
            hint: "Sección Proyectos. Acá cargás fichas, no el proyecto entero. El código va en GitHub; acá van explicación, tecnologías, imagen, demo y repositorio."
            fields:
              - { label: "Nombre", name: "name", widget: "string", hint: "Ejemplo: Gestor de tareas, Calculadora Java, Portafolio web." }
              - label: "Estado"
                name: "status"
                widget: "select"
                default: "En desarrollo"
                options: ["En desarrollo", "Activo", "Terminado", "Universitario", "Práctica", "En pausa"]
                hint: "Sirve para que quien mira sepa si es practica, universitario o proyecto activo."
              - label: "Tipo"
                name: "type"
                widget: "select"
                default: "Práctica"
                options: ["Frontend", "Backend", "Full stack", "Escritorio", "Estructuras de datos", "Base de datos", "QA / Testing", "Práctica"]
                hint: "También se usa para los filtros visibles de la web."
              - { label: "Descripción", name: "description", widget: "text", hint: "Resumen corto: qué hace el proyecto y con qué enfoque fue construido." }
              - { label: "Problema u objetivo", name: "problem", widget: "text", required: false, hint: "Qué problema resuelve o qué práctica querías demostrar." }
              - { label: "Aprendizaje", name: "learning", widget: "text", required: false, hint: "Qué aprendiste: POO, DOM, SQL, Git, diseño responsive, etc." }
              - { label: "Próximo paso", name: "nextStep", widget: "text", required: false, hint: "Mejora pendiente: README, capturas, demo, validaciones, login, base de datos." }
              - label: "Imagen o captura"
                name: "image"
                widget: "image"
                required: false
                media_folder: "assets/uploads"
                public_folder: "assets/uploads"
                media_library:
                  config:
                    multiple: false
                hint: "Opcional. Subí una captura liviana desde tu computadora. Ideal: PNG/JPG horizontal, no muy pesado."
              - label: "Tecnologías"
                name: "tags"
                widget: "list"
                summary: "{{fields.tag}}"
                minimize_collapsed: true
                hint: "Agregá una tecnología por item: HTML, CSS, JavaScript, Java, Python, SQL, Git."
                field: { label: "Tecnología", name: "tag", widget: "string" }
              - label: "Enlaces"
                name: "links"
                widget: "list"
                summary: "{{fields.label}}"
                minimize_collapsed: true
                hint: "Lo ideal es cargar al menos el repositorio de GitHub. Si no hay demo todavía, dejá ese enlace vacáo o no lo agregués."
                fields:
                  - label: "Texto"
                    name: "label"
                    widget: "select"
                    options: ["Repositorio", "Ver demo", "Ver sitio", "Demo pendiente", "Documentación"]
                    hint: "Texto que aparece en el botón."
                  - { label: "Enlace", name: "href", widget: "string", required: false, hint: "Pega la URL de GitHub, Netlify, Vercel, GitHub Pages o documentación." }
                  - label: "Ícono"
                    name: "icon"
                    widget: "select"
                    default: "external"
                    required: false
                    options:
                      - { label: "GitHub", value: "github" }
                      - { label: "Enlace externo", value: "external" }

          - label: "Habilidades"
            name: "skills"
            widget: "list"
            summary: "{{fields.label}}"
            minimize_collapsed: true
            hint: "Sección Habilidades. Cada categoría aparece como pestaña: Base actual, Herramientas, Próximo foco, Competencias."
            fields:
              - { label: "ID interno", name: "id", widget: "string", hint: "No cambiar si ya existe. Identifica la pestaña por dentro." }
              - { label: "Título visible", name: "label", widget: "string", hint: "Nombre de la pestaña que ve el visitante." }
              - label: "Items"
                name: "items"
                widget: "list"
                summary: "{{fields.name}}"
                minimize_collapsed: true
                fields:
                  - { label: "Nombre", name: "name", widget: "string", hint: "Ejemplo: Java, GitHub, Trabajo en equipo." }
                  - { label: "Nota", name: "note", widget: "text", hint: "Descripción corta de cómo usás esa habilidad." }
                  - label: "Ícono"
                    name: "icon"
                    widget: "select"
                    required: false
                    options: ["python", "java", "html", "css", "database", "git", "github", "vscode", "office", "deploy", "javascript", "react", "server", "testing", "check", "team", "adapt", "problem", "spark"]
                    hint: "Elegí un Ícono de la lista para evitar errores de tipeo."
                  - { label: "Color del Ícono", name: "accent", widget: "color", required: false, hint: "Color de la tarjeta e Ícono. Si dudás, dejá el que ya está." }

          - label: "Cursos y aprendizaje"
            name: "learning"
            widget: "list"
            summary: "{{fields.status}} - {{fields.title}}"
            minimize_collapsed: true
            hint: "Sección Cursos. Carga cursos realizados, en progreso o próximos aprendizajes relevantes."
            fields:
              - { label: "Estado", name: "status", widget: "string" }
              - { label: "Título", name: "title", widget: "string" }
              - { label: "Institución o plataforma", name: "provider", widget: "string" }
              - { label: "Descripción", name: "description", widget: "text" }

          - label: "Formación y línea de tiempo"
            name: "timeline"
            widget: "list"
            summary: "{{fields.period}} - {{fields.title}}"
            minimize_collapsed: true
            hint: "Sección Formación. Línea de tiempo para universidad, cursos, idiomas y objetivo profesional."
            fields:
              - { label: "Período", name: "period", widget: "string" }
              - { label: "Título", name: "title", widget: "string" }
              - { label: "Descripción", name: "description", widget: "text" }

          - label: "Perfiles"
            name: "profileLinks"
            widget: "list"
            summary: "{{fields.label}}"
            minimize_collapsed: true
            hint: "Sección Perfiles. GitHub y LinkedIn usan sus links. El botón CV usa automáticamente el archivo cargado en Perfil > Subir CV en PDF."
            fields:
              - { label: "Etiqueta", name: "label", widget: "string", hint: "Ejemplo: GitHub, LinkedIn, CV." }
              - { label: "Descripción", name: "description", widget: "text", hint: "Texto corto que explica qué encuentra el visitante ahí." }
              - { label: "Texto del botón", name: "cta", widget: "string", hint: "Ejemplo: Abrir, Descargar." }
              - { label: "Enlace", name: "href", widget: "string", required: false, hint: "Para GitHub/LinkedIn pega el link. Para CV podés dejarlo igual: la web usa automáticamente Perfil > CV." }
              - label: "Ícono"
                name: "icon"
                widget: "select"
                required: false
                options:
                  - { label: "GitHub", value: "github" }
                  - { label: "LinkedIn", value: "linkedin" }
                  - { label: "Descarga / CV", value: "download" }
                  - { label: "Enlace externo", value: "external" }

          - label: "Contacto"
            name: "contactLinks"
            widget: "list"
            summary: "{{fields.label}}"
            minimize_collapsed: true
            hint: "Sección Contacto del pie de página. Ideal para Gmail y WhatsApp."
            fields:
              - { label: "Texto", name: "label", widget: "string", hint: "Ejemplo: Enviar email, Escribir por WhatsApp." }
              - { label: "Detalle", name: "detail", widget: "string", required: false, hint: "Texto chico debajo del botón." }
              - label: "Ícono"
                name: "icon"
                widget: "select"
                required: false
                options:
                  - { label: "Mail", value: "mail" }
                  - { label: "WhatsApp", value: "whatsapp" }
                  - { label: "Enlace externo", value: "external" }
              - { label: "Enlace", name: "href", widget: "string", required: false, hint: "Link completo. Gmail puede usar https://mail.google.com/mail/?view=cm&fs=1&to=tuemail." }
              - { label: "Texto accesible", name: "ariaLabel", widget: "string", required: false, hint: "Descripción para lectores de pantalla. Ejemplo: Enviar email a Iván." }
